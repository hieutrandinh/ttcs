<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between mb-3">
        <h2>Quản lý Sản phẩm</h2>
        <button class="btn" [ngClass]="showForm ? 'btn-secondary' : 'btn-success'" (click)="toggleForm()">
            {{ showForm ? 'Đóng Form' : '+ Thêm mới' }}
        </button>
    </div>

    <div class="card mb-4" *ngIf="showForm">
        <div class="card-header bg-light fw-bold">
            {{ isEditMode ? 'Cập nhật thông tin sản phẩm (ID: ' + editProductId + ')' : 'Thêm sản phẩm mới' }}
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" class="form-control" [(ngModel)]="productForm.name">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Giá ($)</label>
                    <input type="number" class="form-control" [(ngModel)]="productForm.price">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Danh mục</label>
                    <select class="form-control" [(ngModel)]="productForm.category_id">
                        <option value="0" disabled>Chọn danh mục</option>
                        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea class="form-control" rows="3" [(ngModel)]="productForm.description"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" (click)="saveProduct()">
                    {{ isEditMode ? 'Cập nhật sản phẩm' : 'Lưu sản phẩm' }}
                </button>
                <button class="btn btn-secondary" (click)="resetForm()">Hủy</button>
            </div>
        </div>
    </div>

    <table class="table table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th style="width: 80px;">ID</th>
                <th>Tên sản phẩm</th>
                <th style="width: 120px;">Giá</th>
                <th>Mô tả</th>
                <th style="width: 160px;">Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td>{{ product.id }}</td>
                <td class="fw-bold">{{ product.name }}</td>
                <td>{{ product.price | number:'1.2-2' }}</td>
                <td>{{ product.description }}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-2" (click)="editProduct(product)">Sửa</button>
                    <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)">Xóa</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center mt-3" *ngIf="totalPages > 1">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" *ngIf="currentPage > 1">
                    <a class="page-link" style="cursor: pointer;" (click)="onPageChange(1)">First</a>
                </li>
                <li class="page-item" *ngIf="currentPage > 1">
                    <a class="page-link" style="cursor: pointer;" (click)="onPageChange(currentPage - 1)">Previous</a>
                </li>
                <ng-container *ngFor="let page of visiblePages">
                    <li class="page-item" [ngClass]="{'active': page === currentPage}">
                        <a class="page-link" style="cursor: pointer;" (click)="onPageChange(page)">{{ page }}</a>
                    </li>
                </ng-container>
                <li class="page-item" *ngIf="currentPage < totalPages">
                    <a class="page-link" style="cursor: pointer;" (click)="onPageChange(currentPage + 1)">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
