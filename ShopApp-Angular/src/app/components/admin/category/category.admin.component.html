<div class="container-fluid mt-3">
    <h2>Quản lý Danh mục</h2>

    <div class="card mb-4">
        <div class="card-body">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Nhập tên danh mục..." [(ngModel)]="categoryName">
                <button class="btn btn-primary" (click)="saveCategory()">
                    {{ isEditMode ? 'Cập nhật' : 'Thêm danh mục' }}
                </button>
                <button *ngIf="isEditMode" class="btn btn-secondary" (click)="resetForm()">Hủy</button>
            </div>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên danh mục</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let category of categories">
                <td>{{ category.id }}</td>
                <td>{{ category.name }}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-2" (click)="editCategory(category)">Sửa</button>
                    <button class="btn btn-sm btn-danger" (click)="deleteCategory(category.id)">Xóa</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
